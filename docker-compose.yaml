services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: invoice-generator-app
    container_name: invoice-generator-app
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: >
      sh -c "mkdir -p /var/www/storage/framework/views &&
             chown -R www-data:www-data /var/www/storage /var/www/bootstrap/cache &&
             chmod -R 775 /var/www/storage /var/www/bootstrap/cache &&
             php-fpm"
    networks:
      - invoice-network
    depends_on:
      - db

  webserver:
    image: nginx:alpine
    container_name: invoice-generator-webserver
    volumes:
      - .:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8000:80"
    networks:
      - invoice-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: invoice-generator-db
    environment:
      MYSQL_DATABASE: invoice_generator
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - invoice-network

networks:
  invoice-network:
    driver: bridge

volumes:
  dbdata:
